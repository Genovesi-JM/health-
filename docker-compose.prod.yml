# ═══════════════════════════════════════════════════════════════
# Health Platform — Production Docker Compose (DigitalOcean)
#
# Option A — Local Docker PostgreSQL (simple / testing):
#   cp .env.production .env   # set DB_PASSWORD
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Option B — DigitalOcean Managed PostgreSQL (recommended for production):
#   1. Add to your .env:
#      DATABASE_URL=postgresql://doadmin:<pw>@<host>.db.ondigitalocean.com:25060/defaultdb?sslmode=require
#   2. Comment out (or remove) the `db` service below — it is not needed.
#   3. Remove `db` from the backend `depends_on` block below.
#   4. docker compose -f docker-compose.prod.yml up -d --build
#
# The backend reads DATABASE_URL directly; the `db` service is only used when
# DATABASE_URL is not set (falls back to the local postgres container).
# ═══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL (local — Option A only, skip for Managed DB) ──
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: health_platform
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user -d health_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend API (FastAPI + Gunicorn) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - ENV=production
      - SECRET_KEY=${SECRET_KEY}
      # DATABASE_URL: if set in .env (Managed PostgreSQL), it takes precedence.
      # Otherwise falls back to the local `db` container (Option A).
      - DATABASE_URL=${DATABASE_URL:-postgresql://health_user:${DB_PASSWORD}@db:5432/health_platform}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - FRONTEND_BASE=${FRONTEND_BASE:-http://localhost}
      - BACKEND_BASE=${BACKEND_BASE:-http://localhost}
      - DO_SPACES_KEY=${DO_SPACES_KEY:-}
      - DO_SPACES_SECRET=${DO_SPACES_SECRET:-}
      - DO_SPACES_BUCKET=${DO_SPACES_BUCKET:-health-platform-files}
      - DO_SPACES_REGION=${DO_SPACES_REGION:-fra1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (React + Nginx + Reverse Proxy) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  pg_data:
    driver: local

networks:
  internal:
    driver: bridge
