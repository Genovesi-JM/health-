<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340">
  <defs>
    <linearGradient id="cl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <linearGradient id="cl-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="cl-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="540" height="340" rx="20" fill="url(#cl-bg)"/>
  <circle cx="500" cy="42" r="68" fill="#0891b2" opacity="0.06"/>
  <circle cx="55" cy="308" r="52" fill="#06b6d4" opacity="0.07"/>

  <!-- ── Clinic header ── -->
  <rect x="20" y="18" width="500" height="52" rx="12" fill="url(#cl-header)" filter="url(#cl-shadow)"/>
  <text x="48" y="36" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">🏥 Clínica São Lucas</text>
  <text x="48" y="54" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white">Painel de Gestão — Terça, 7 Mai</text>
  <rect x="400" y="26" width="110" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <text x="455" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="white">● 14 em clínica</text>

  <!-- ── KPI row ── -->
  <rect x="20" y="82" width="108" height="60" rx="10" fill="white" filter="url(#cl-shadow)"/>
  <text x="34" y="100" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Check-ins hoje</text>
  <text x="34" y="122" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#0891b2">38</text>
  <text x="34" y="136" font-family="system-ui,sans-serif" font-size="8" fill="#22c55e" font-weight="600">↑ 5 vs ontem</text>

  <rect x="138" y="82" width="108" height="60" rx="10" fill="white" filter="url(#cl-shadow)"/>
  <text x="152" y="100" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Consultas pendentes</text>
  <text x="152" y="122" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#f59e0b">7</text>
  <text x="152" y="136" font-family="system-ui,sans-serif" font-size="8" fill="#f59e0b">2 prioritárias</text>

  <rect x="256" y="82" width="108" height="60" rx="10" fill="white" filter="url(#cl-shadow)"/>
  <text x="270" y="100" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Médicos hoje</text>
  <text x="270" y="122" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#0891b2">5</text>
  <text x="270" y="136" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">3 em consulta</text>

  <rect x="374" y="82" width="146" height="60" rx="10" fill="#0891b2" filter="url(#cl-shadow)"/>
  <text x="447" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Faturação hoje</text>
  <text x="447" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="white">485 000</text>
  <text x="447" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Kz</text>

  <!-- ── Schedule grid ── -->
  <rect x="20" y="154" width="320" height="170" rx="12" fill="white" filter="url(#cl-shadow)"/>
  <text x="36" y="172" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Agenda de Hoje</text>

  <!-- Time slots -->
  <g font-family="system-ui,sans-serif">
    <!-- 13:00 -->
    <text x="36" y="192" font-size="9" fill="#94a3b8">13:00</text>
    <rect x="76" y="182" width="248" height="18" rx="6" fill="#dcfce7"/>
    <text x="84" y="194" font-size="9" fill="#166534" font-weight="600">João Pereira — Clínica Geral ✓</text>

    <!-- 13:30 -->
    <text x="36" y="212" font-size="9" fill="#94a3b8">13:30</text>
    <rect x="76" y="202" width="248" height="18" rx="6" fill="#dbeafe"/>
    <text x="84" y="214" font-size="9" fill="#1d4ed8" font-weight="600">Sara Costa — Pediatria ● em curso</text>

    <!-- 14:00 -->
    <text x="36" y="232" font-size="9" fill="#94a3b8">14:00</text>
    <rect x="76" y="222" width="248" height="18" rx="6" fill="#fef9c3"/>
    <text x="84" y="234" font-size="9" fill="#854d0e" font-weight="600">Ana Ferreira — Ginecologia · aguarda</text>

    <!-- 14:30 -->
    <text x="36" y="252" font-size="9" fill="#94a3b8">14:30</text>
    <rect x="76" y="242" width="248" height="18" rx="6" fill="#f1f5f9"/>
    <text x="84" y="254" font-size="9" fill="#475569">Rui Lemos — Cardiologia</text>

    <!-- 15:00 -->
    <text x="36" y="272" font-size="9" fill="#94a3b8">15:00</text>
    <rect x="76" y="262" width="248" height="18" rx="6" fill="#f1f5f9"/>
    <text x="84" y="274" font-size="9" fill="#475569">Maria Neto — Dermatologia</text>

    <!-- 15:30 -->
    <text x="36" y="292" font-size="9" fill="#94a3b8">15:30</text>
    <rect x="76" y="282" width="248" height="18" rx="6" fill="#f1f5f9"/>
    <text x="84" y="294" font-size="9" fill="#475569">Carlos Matos — Neurologia</text>

    <!-- 16:00 -->
    <text x="36" y="312" font-size="9" fill="#94a3b8">16:00</text>
    <rect x="76" y="302" width="248" height="18" rx="6" fill="#f1f5f9"/>
    <text x="84" y="314" font-size="9" fill="#475569">Inês Sousa — Oftalmologia</text>
  </g>

  <!-- ── Right mini panel ── -->
  <rect x="354" y="154" width="166" height="170" rx="12" fill="white" filter="url(#cl-shadow)"/>
  <text x="370" y="172" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Salas</text>

  <!-- Room status -->
  <g font-family="system-ui,sans-serif" font-size="10">
    <rect x="370" y="180" width="134" height="22" rx="8" fill="#dcfce7"/>
    <circle cx="382" cy="191" r="4" fill="#22c55e"/>
    <text x="390" y="195" fill="#166534" font-weight="600">Sala 1 — Em uso</text>

    <rect x="370" y="208" width="134" height="22" rx="8" fill="#dcfce7"/>
    <circle cx="382" cy="219" r="4" fill="#22c55e"/>
    <text x="390" y="223" fill="#166534" font-weight="600">Sala 2 — Em uso</text>

    <rect x="370" y="236" width="134" height="22" rx="8" fill="#fef9c3"/>
    <circle cx="382" cy="247" r="4" fill="#f59e0b"/>
    <text x="390" y="251" fill="#854d0e" font-weight="600">Sala 3 — Prep.</text>

    <rect x="370" y="264" width="134" height="22" rx="8" fill="#f1f5f9"/>
    <circle cx="382" cy="275" r="4" fill="#94a3b8"/>
    <text x="390" y="279" fill="#475569">Sala 4 — Livre</text>

    <rect x="370" y="292" width="134" height="22" rx="8" fill="#f1f5f9"/>
    <circle cx="382" cy="303" r="4" fill="#94a3b8"/>
    <text x="390" y="307" fill="#475569">Sala 5 — Livre</text>
  </g>
</svg>
