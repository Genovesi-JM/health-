<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340">
  <defs>
    <linearGradient id="es-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="es-avatar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="es-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="540" height="340" rx="20" fill="url(#es-bg)"/>
  <circle cx="500" cy="45" r="70" fill="#7c3aed" opacity="0.05"/>
  <circle cx="55" cy="310" r="55" fill="#8b5cf6" opacity="0.06"/>

  <!-- ── Header ── -->
  <rect x="20" y="18" width="500" height="52" rx="12" fill="white" filter="url(#es-shadow)"/>
  <circle cx="52" cy="44" r="18" fill="url(#es-avatar)"/>
  <text x="52" y="49" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">🔬</text>
  <text x="80" y="38" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Rede de Especialistas</text>
  <text x="80" y="54" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Segunda opinião · Referenciação · Casos</text>
  <rect x="400" y="28" width="110" height="28" rx="14" fill="#f3e8ff"/>
  <text x="455" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#6d28d9">248 especialistas</text>

  <!-- ── Specialty chips ── -->
  <text x="20" y="90" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6d28d9">Especialidades disponíveis</text>
  <g font-family="system-ui,sans-serif" font-size="10" font-weight="600">
    <rect x="20" y="97" width="88" height="24" rx="12" fill="#6d28d9"/>
    <text x="64" y="113" text-anchor="middle" fill="white">Cardiologia</text>

    <rect x="116" y="97" width="78" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="155" y="113" text-anchor="middle" fill="#6d28d9">Neurologia</text>

    <rect x="202" y="97" width="68" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="236" y="113" text-anchor="middle" fill="#6d28d9">Pediatria</text>

    <rect x="278" y="97" width="84" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="320" y="113" text-anchor="middle" fill="#6d28d9">Oncologia</text>

    <rect x="370" y="97" width="80" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="410" y="113" text-anchor="middle" fill="#6d28d9">Psiquiatria</text>

    <rect x="458" y="97" width="62" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
    <text x="489" y="113" text-anchor="middle" fill="#6d28d9">+8 mais</text>
  </g>

  <!-- ── Case cards ── -->
  <text x="20" y="142" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6d28d9">Casos Ativos — Segunda Opinião</text>

  <!-- Case 1 -->
  <rect x="20" y="150" width="240" height="82" rx="11" fill="white" filter="url(#es-shadow)"/>
  <rect x="20" y="150" width="4" height="82" rx="2" fill="#6d28d9"/>
  <text x="36" y="168" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Caso #2847</text>
  <rect x="180" y="156" width="70" height="18" rx="9" fill="#fef9c3"/>
  <text x="215" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#854d0e">Em análise</text>
  <text x="36" y="184" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Especialidade: Neurologia</text>
  <text x="36" y="199" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Cefaleias recorrentes, 34F</text>
  <text x="36" y="214" font-family="system-ui,sans-serif" font-size="9" fill="#7c3aed" font-weight="600">Dr. A. Neto — Resp. em 4h</text>
  <rect x="152" y="220" width="98" height="18" rx="9" fill="#f3e8ff"/>
  <text x="201" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#6d28d9">Ver detalhes →</text>

  <!-- Case 2 -->
  <rect x="20" y="241" width="240" height="82" rx="11" fill="white" filter="url(#es-shadow)"/>
  <rect x="20" y="241" width="4" height="82" rx="2" fill="#dc2626"/>
  <text x="36" y="259" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Caso #2851</text>
  <rect x="180" y="247" width="70" height="18" rx="9" fill="#fee2e2"/>
  <text x="215" y="259" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#991b1b">Urgente</text>
  <text x="36" y="275" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Especialidade: Cardiologia</text>
  <text x="36" y="290" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Arritmia suspeita, 58M</text>
  <text x="36" y="305" font-family="system-ui,sans-serif" font-size="9" fill="#dc2626" font-weight="600">Dr. J. Costa — Prioridade ↑</text>
  <rect x="152" y="311" width="98" height="18" rx="9" fill="#fee2e2"/>
  <text x="201" y="323" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#991b1b">Ver caso →</text>

  <!-- ── Stats right panel ── -->
  <rect x="274" y="150" width="246" height="173" rx="12" fill="white" filter="url(#es-shadow)"/>
  <text x="290" y="170" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Atividade da Rede</text>

  <!-- Stat rows -->
  <g font-family="system-ui,sans-serif">
    <text x="290" y="192" font-size="10" fill="#64748b">Casos respondidos (30d)</text>
    <text x="490" y="192" text-anchor="end" font-size="13" font-weight="800" fill="#6d28d9">1 284</text>

    <line x1="290" y1="200" x2="510" y2="200" stroke="#f1f5f9" stroke-width="1"/>

    <text x="290" y="217" font-size="10" fill="#64748b">Tempo médio de resposta</text>
    <text x="490" y="217" text-anchor="end" font-size="13" font-weight="800" fill="#0d9488">2.4h</text>

    <line x1="290" y1="225" x2="510" y2="225" stroke="#f1f5f9" stroke-width="1"/>

    <text x="290" y="242" font-size="10" fill="#64748b">Satisfação pacientes</text>
    <text x="490" y="242" text-anchor="end" font-size="13" font-weight="800" fill="#f59e0b">4.8 ★</text>

    <line x1="290" y1="250" x2="510" y2="250" stroke="#f1f5f9" stroke-width="1"/>

    <text x="290" y="267" font-size="10" fill="#64748b">Especialistas ativos</text>
    <text x="490" y="267" text-anchor="end" font-size="13" font-weight="800" fill="#6d28d9">248</text>
  </g>

  <!-- Mini bar chart -->
  <text x="290" y="290" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Casos por área</text>
  <g>
    <!-- Cardio -->
    <rect x="290" y="297" width="58" height="10" rx="5" fill="#e0e7ff"/>
    <rect x="290" y="297" width="46" height="10" rx="5" fill="#6d28d9"/>
    <text x="352" y="306" font-family="system-ui,sans-serif" font-size="8" fill="#64748b"> Cardio 38%</text>
    <!-- Neuro -->
    <rect x="290" y="311" width="58" height="10" rx="5" fill="#e0e7ff"/>
    <rect x="290" y="311" width="32" height="10" rx="5" fill="#8b5cf6"/>
    <text x="352" y="320" font-family="system-ui,sans-serif" font-size="8" fill="#64748b"> Neuro 26%</text>
  </g>
</svg>
